name: DevSecOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # weekly on Sunday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=moderate

      - name: npm audit (all)
        run: npm audit --audit-level=moderate

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  typecheck:
    name: Worker & Bridge Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared packages (Worker needs type declarations)
        run: npm run build

      - name: Worker typecheck
        run: npx tsc --noEmit --project apps/worker/tsconfig.json

      - name: Bridge typecheck
        run: npx tsc --noEmit --project apps/bridge/tsconfig.json
