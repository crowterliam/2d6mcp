name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Root typecheck (tsc --build)
        run: npm run build

      - name: Worker typecheck
        run: npx tsc --noEmit --project apps/worker/tsconfig.json

      - name: Bridge typecheck
        run: npx tsc --noEmit --project apps/bridge/tsconfig.json

      - name: Full build
        run: echo "build already ran"

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run populate-ogl
      - run: npm run populate-dw

      - name: Run tests
        run: npm test

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run populate-ogl
      - run: npm run populate-dw

      - name: Coverage report
        run: npm run test:coverage
